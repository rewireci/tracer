name: Publish (ruby)

on:
  push:
    tags: ["packages/ruby/v*"]

jobs:
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: ruby
          bundler-cache: true
      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#packages/ruby/v}
          sed -i "s/VERSION = .*/VERSION = \"${VERSION}\"/" lib/rewire/tracer/version.rb
        working-directory: ruby
      - name: Build gem
        run: gem build rewire-tracer.gemspec
        working-directory: ruby
      - name: Configure RubyGems credentials
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - name: Push gem
        run: gem push rewire-tracer-*.gem
        working-directory: ruby
